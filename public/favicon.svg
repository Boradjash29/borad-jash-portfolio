<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#101318"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- JB monogram — centered and balanced -->
  <text x="32" y="44" text-anchor="middle" font-family="system-ui, -apple-system, Arial, sans-serif" font-weight="900" font-style="italic" font-size="32" letter-spacing="-1" fill="#ffffff">JB</text>
  <!-- Yellow accent dot -->
  <circle cx="52" cy="42" r="3.5" fill="#EBDA28"/>
  <!-- Top-left decorative bars matching || JB || brand -->
  <rect x="8" y="12" width="10" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="8" y="17" width="6" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>
</svg>
